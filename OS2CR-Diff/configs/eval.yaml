dataset_params:
  im_path: 'data/train/images'
  csv_path: 'external.csv'
  output_txt_path: 'output.txt'
  fixed_stain:       ['dapi', 'autofluorescence']
  prior_stain:       'cd8'
  conditional_stain: ['cd68', 'cd16', 'sox10']

diffusion_params:
  num_timesteps : 1000
  beta_start : 0.0001
  beta_end : 0.02

model_params:
  im_channels: 1
  down_channels: [64, 128, 256, 256, 512]
  mid_channels: [512, 512, 256]
  down_sample: [True, True, True, True]
  time_emb_dim: 128
  num_down_layers: 2
  num_mid_layers: 2
  num_up_layers: 2
  num_heads: 4
  use_attention: [False, False, True, True]
  use_condition: true
  condition_blocks: ["down_3", "mid1", "mid2", "up_0"]

train_params:
  task_name: 'mif_diff'
  image_size: 224
  batch_size: 8
  num_workers: 4
  num_epochs: 2000
  num_samples : 10
  patience : 10
  num_grid_rows : 10
  lr: 0.00005
  ckpt_name: 'ddpm_ckpt.pth'
  ckpt_load_name: 'ddpm_ckpt_v_epoch_98.pth'

